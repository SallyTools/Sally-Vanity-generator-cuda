name: release

# Build ONE self-contained executable per platform with PyInstaller --onefile:
# the PySide6 GUI, the Python runtime, and the native vanity engine(s) are all bundled
# into a single file. Users download one executable — no Python, no separate binary,
# no installer. Windows ships a .exe; Linux and macOS ship native executables.
#
# 128-bit math note: the crypto core uses `unsigned __int128` (64-bit GCC/Clang only),
# so Windows is built with MinGW-w64 g++ (not MSVC) and only 64-bit targets ship.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write   # softprops/action-gh-release creates/edits the release

jobs:
  # =========================================================================
  # Linux x86_64 — CPU engine bundled
  # =========================================================================
  linux-cpu:
    name: linux-x86_64 (cpu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Build engine (g++, static C++ runtime)
        run: |
          g++ -O3 -std=c++17 -fopenmp -pthread -static-libgcc -static-libstdc++ \
            -x c++ -Isrc src/vanity.cu   -o vanity-cpu
          g++ -O3 -std=c++17 -fopenmp -pthread \
            -x c++ -Isrc src/selftest.cu -o selftest-cpu
      - name: Selftest (gate)
        run: ./selftest-cpu
      - name: Bundle one-file executable
        run: |
          python -m pip install --quiet pyinstaller PySide6 psutil
          pyinstaller --onefile --noconsole --clean --noconfirm \
            --name SallyVanity-linux-x86_64 \
            --add-binary "vanity-cpu:." \
            --add-data "assets:assets" \
            gui/app.py
          SV_SELFCHECK=1 dist/SallyVanity-linux-x86_64   # verify the bundle
      - uses: actions/upload-artifact@v7
        with:
          name: SallyVanity-linux-x86_64
          path: dist/SallyVanity-linux-x86_64
          if-no-files-found: error

  # =========================================================================
  # Linux x86_64 CUDA — GPU + CPU engines bundled (GPU/Hybrid usable)
  # =========================================================================
  linux-cuda:
    name: linux-x86_64-cuda (gpu+cpu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: "12.6.2"
          method: network
          # Only the compiler + runtime dev libs; the full meta-package pulls the
          # driver/DKMS, which fails to build on the driverless CI runner.
          sub-packages: '["nvcc", "cudart-dev"]'
      - name: Build engines (nvcc GPU w/ static cudart + g++ CPU)
        run: |
          # static cudart so the GPU binary needs only the NVIDIA driver (libcuda),
          # not a full CUDA-toolkit install, on the user's machine.
          make all NVCC="nvcc --cudart=static"
          g++ -O3 -std=c++17 -fopenmp -pthread -static-libgcc -static-libstdc++ \
            -x c++ -Isrc src/vanity.cu -o vanity-cpu
      - name: Selftest (host-only, gate)
        run: ./selftest
      - name: Bundle one-file executable (GPU + CPU)
        run: |
          python -m pip install --quiet pyinstaller PySide6 psutil
          pyinstaller --onefile --noconsole --clean --noconfirm \
            --name SallyVanity-linux-x86_64-cuda \
            --add-binary "vanity:." --add-binary "vanity-cpu:." \
            --add-data "assets:assets" \
            gui/app.py
          SV_SELFCHECK=1 dist/SallyVanity-linux-x86_64-cuda
      - uses: actions/upload-artifact@v7
        with:
          name: SallyVanity-linux-x86_64-cuda
          path: dist/SallyVanity-linux-x86_64-cuda
          if-no-files-found: error

  # =========================================================================
  # Windows x86_64 — CPU engine bundled (.exe). MinGW builds the engine, a
  # native Python builds the onefile (MSVC lacks __int128, so not used for C++).
  # =========================================================================
  windows:
    name: windows-x86_64 (cpu)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-gcc
      - name: Build engine (MinGW g++, static runtime)
        shell: 'msys2 {0}'
        run: |
          g++ -O3 -std=c++17 -fopenmp -pthread -static -x c++ -Isrc src/vanity.cu   -o vanity-cpu.exe
          g++ -O3 -std=c++17 -fopenmp -pthread -static -x c++ -Isrc src/selftest.cu -o selftest-cpu.exe
      - name: Selftest (gate)
        shell: 'msys2 {0}'
        run: ./selftest-cpu.exe
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Bundle one-file .exe
        shell: pwsh
        run: |
          python -m pip install --quiet pyinstaller PySide6 psutil
          pyinstaller --onefile --noconsole --clean --noconfirm `
            --name SallyVanity-windows-x86_64 `
            --icon assets/icon.ico `
            --add-binary "vanity-cpu.exe;." `
            --add-data "assets;assets" `
            gui/app.py
      - uses: actions/upload-artifact@v7
        with:
          name: SallyVanity-windows-x86_64
          path: dist/SallyVanity-windows-x86_64.exe
          if-no-files-found: error

  # =========================================================================
  # macOS arm64 (Apple Silicon) — CPU engine bundled, static libomp
  # =========================================================================
  macos-arm64:
    name: macos-arm64 (cpu)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Build engine (clang + static libomp)
        run: |
          brew install libomp
          OMP="$(brew --prefix libomp)"
          # link libomp.a statically so the bundled engine needs no brew dylib
          clang++ -O3 -std=c++17 -Xpreprocessor -fopenmp -I"$OMP/include" -pthread \
            -x c++ -Isrc src/vanity.cu   "$OMP/lib/libomp.a" -o vanity-cpu
          clang++ -O3 -std=c++17 -Xpreprocessor -fopenmp -I"$OMP/include" -pthread \
            -x c++ -Isrc src/selftest.cu "$OMP/lib/libomp.a" -o selftest-cpu
      - name: Selftest (gate)
        run: ./selftest-cpu
      - name: Bundle one-file executable
        run: |
          python -m pip install --quiet pyinstaller PySide6 psutil
          # no --windowed: that produces a .app bundle; we want a single file
          pyinstaller --onefile --clean --noconfirm \
            --name SallyVanity-macos-arm64 \
            --add-binary "vanity-cpu:." \
            --add-data "assets:assets" \
            gui/app.py
          SV_SELFCHECK=1 dist/SallyVanity-macos-arm64
      - uses: actions/upload-artifact@v7
        with:
          name: SallyVanity-macos-arm64
          path: dist/SallyVanity-macos-arm64
          if-no-files-found: error

  # =========================================================================
  # Publish: gather the executables and attach them to the GitHub Release
  # =========================================================================
  release:
    name: publish release
    needs: [linux-cpu, linux-cuda, windows, macos-arm64]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with: { path: dist, merge-multiple: true }
      - name: List assets
        run: ls -la dist
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/SallyVanity-*
          generate_release_notes: true
          fail_on_unmatched_files: false
